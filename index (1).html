<!DOCTYPE html>
<html lang="en">
<head>
 <!-- ============================= -->
 <!-- META CONFIGURATION -->
 <!-- ============================= -->
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>AdaptIQ – Adaptive Online Assessment Platform</title>
 <meta name="description" content="AI-powered adaptive testing platform with real-time difficulty adjustment using IRT." />
 <!-- ============================= -->
 <!-- EXTERNAL STYLESHEET (PLACEHOLDER) -->
 <!-- ============================= -->
 <link rel="stylesheet" href="css/style.css" />
 <!-- ============================= -->
 <!-- INTERNAL CSS (FULL VERSION) -->
 <!-- ============================= -->
 <style>
 :root {
 --bg-card: #13131e;
 --border: #2a2a3a;
 --radius-xl: 18px;
 --radius-lg: 14px;
 --accent-purple: #6366f1;
 --accent-red: #ef4444;
 --text-secondary: #a1a1aa;
 }
 body {
 margin: 0;
 font-family: 'Segoe UI', sans-serif;
 background: #0f0f17;
 color: white;
 overflow-x: hidden;
 }
 .hero {
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 padding: 80px 24px;
 text-align: center;
 }
 .role-cards {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 20px;
 max-width: 600px;
 width: 100%;
 }
 .role-card {
 background: var(--bg-card);
 border: 1.5px solid var(--border);
 border-radius: var(--radius-xl);
 padding: 32px 24px;
 cursor: pointer;
 transition: all 0.3s ease;
 }
 .role-card:hover {
 border-color: var(--accent-purple);
 transform: translateY(-4px);
 }
 .modal-overlay {
 position: fixed;
 inset: 0;
 background: rgba(0,0,0,0.7);
 display: flex;
 align-items: center;
 justify-content: center;
 opacity: 0;
 pointer-events: none;
 transition: 0.3s;
 z-index: 1000;
 }
 .modal-overlay.open {
 opacity: 1;
 pointer-events: all;
 }
 .modal {
 background: #13131e;
 border-radius: var(--radius-xl);
 padding: 40px;
 width: 100%;
 max-width: 420px;
 border: 1px solid var(--border);
 }
 input, select {
 width: 100%;
 padding: 10px;
 margin-bottom: 12px;
 border-radius: 8px;
 border: 1px solid var(--border);
 background: #1c1c28;
 color: white;
 font-size: 0.95rem;
 }
 input:focus, select:focus {
 outline: 1px solid var(--accent-purple);
 border-color: transparent;
 }
 button {
 padding: 10px 14px;
 border-radius: 8px;
 border: none;
 cursor: pointer;
 font-weight: 600;
 transition: 0.15s;
 }
 .btn-primary { background: var(--accent-purple); color: white; }
 .btn-primary:hover { background: #4f52e0; }
 .btn-secondary { background: #374151; color: white; }
 .btn-secondary:hover { background: #4b5563; }
 .btn-success { background: #16a34a; color: white; }
 .btn-success:hover { background: #15803d; }
 .error-msg {
 color: var(--accent-red);
 display: none;
 font-size: 0.85rem;
 margin-top: -8px;
 margin-bottom: 12px;
 text-align: left;
 }
 .modal h2 {
 margin-top: 0;
 margin-bottom: 1.5rem;
 font-weight: 500;
 letter-spacing: -0.02em;
 }
 .button-group {
 display: flex;
 gap: 12px;
 margin-top: 8px;
 }
 .button-group button {
 flex: 1;
 }
 </style>
</head>
<body>
 <!-- ============================= -->
 <!-- HERO SECTION -->
 <!-- ============================= -->
 <main class="hero">
 <h1>Adaptive Assessment Platform</h1>
 <p>Personalized testing powered by Item Response Theory (IRT).</p>
 <div class="role-cards">
 <!-- Student Card -->
 <div class="role-card" onclick="openModal('student')">
 <h3>I'm a Student</h3>
 <p>Start an adaptive test session.</p>
 </div>
 <!-- Instructor Card -->
 <div class="role-card" onclick="openModal('instructor')">
 <h3>I'm an Instructor</h3>
 <p>View analytics and reports.</p>
 </div>
 </div>
 </main>

 <!-- ============================= -->
 <!-- STUDENT MODAL -->
 <!-- ============================= -->
 <div class="modal-overlay" id="studentModal">
 <div class="modal">
 <h2>Student Login</h2>
 <input id="studentName" type="text" placeholder="Full Name" />
 <div id="nameError" class="error-msg">Please enter your name.</div>
 <input id="studentId" type="text" placeholder="Student ID (optional)" />
 <select id="studentGrade">
 <option value="">Select Grade</option>
 <option value="grade10">Grade 10</option>
 <option value="undergrad">Undergraduate</option>
 </select>
 <div class="button-group">
 <button class="btn-primary" onclick="startStudentSession()">Begin Assessment</button>
 <button class="btn-secondary" onclick="closeModal('student')">Cancel</button>
 </div>
 </div>
 </div>

 <!-- ============================= -->
 <!-- INSTRUCTOR MODAL -->
 <!-- ============================= -->
 <div class="modal-overlay" id="instructorModal">
 <div class="modal">
 <h2>Instructor Login</h2>
 <input id="instructorName" type="text" placeholder="Instructor Name" />
 <div id="instError" class="error-msg">Please enter your name.</div>
 <div class="button-group">
 <button class="btn-success" onclick="goInstructor()">Open Dashboard</button>
 <button class="btn-secondary" onclick="closeModal('instructor')">Cancel</button>
 </div>
 </div>
 </div>

 <!-- ============================= -->
 <!-- FIREBASE MODULE + LOGIC (FULL INTEGRATION) -->
 <!-- ============================= -->
 <script type="module">
 // ----- Firebase SDK imports (v10.12) -----
 import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
 import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 // Import analytics and any other products you need
 import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

 // ----- Your Firebase configuration (provided) -----
 const firebaseConfig = {
   apiKey: "AIzaSyA1wU1fyWECpkTXprHwDEUUs8YraFFdiHk",
   authDomain: "college-website-e4684.firebaseapp.com",
   projectId: "college-website-e4684",
   storageBucket: "college-website-e4684.firebasestorage.app",
   messagingSenderId: "860004770297",
   appId: "1:860004770297:web:1550b244e4af7c74901d28",
   measurementId: "G-G0YN0KDJ67"
 };

 // ----- Initialize Firebase -----
 const app = initializeApp(firebaseConfig);
 const analytics = getAnalytics(app);  // Analytics initialized (optional)
 const db = getFirestore(app);

 // Expose Firestore instances globally if needed (already using inside functions)
 console.log("Firebase initialized with project: college-website-e4684");

 // ----- Modal control functions (exposed globally) -----
 window.openModal = function(role) {
   const modalId = role === 'student' ? 'studentModal' : 'instructorModal';
   document.getElementById(modalId).classList.add('open');
   // Clear any previous errors
   if (role === 'student') {
     document.getElementById('nameError').style.display = 'none';
   } else {
     document.getElementById('instError').style.display = 'none';
   }
 };

 window.closeModal = function(role) {
   const modalId = role === 'student' ? 'studentModal' : 'instructorModal';
   document.getElementById(modalId).classList.remove('open');
 };

 // ----- Student session handler (with Firebase write) -----
 window.startStudentSession = async function() {
   const name = document.getElementById('studentName').value.trim();
   let id = document.getElementById('studentId').value.trim();
   const grade = document.getElementById('studentGrade').value;

   // Validation
   if (!name) {
     document.getElementById('nameError').style.display = 'block';
     return;
   }
   document.getElementById('nameError').style.display = 'none';

   // If no ID provided, generate one based on name + timestamp
   if (!id) {
     id = 'STU_' + name.replace(/\s+/g, '_') + '_' + Date.now();
   }

   // Reference to student document
   const studentRef = doc(db, "students", id);

   try {
     const snap = await getDoc(studentRef);
     if (!snap.exists()) {
       // Create student record only if it doesn't exist
       await setDoc(studentRef, {
         name: name,
         grade: grade || 'not specified',
         createdAt: new Date().toISOString(),
         studentId: id
       });
       console.log("New student document created with ID:", id);
     } else {
       console.log("Student already exists, proceeding with session.");
     }

     // Store minimal session info in localStorage (for subsequent pages)
     localStorage.setItem("currentSession", JSON.stringify({ 
       name, 
       id, 
       grade: grade || 'not specified',
       loginTime: new Date().toISOString()
     }));

     // Redirect to student assessment page (you must have student.html)
     window.location.href = "student.html";
   } catch (error) {
     console.error("Firestore error during student session:", error);
     alert("Failed to connect to database. Please try again.");
   }
 };

 // ----- Instructor handler (with optional Firebase record) -----
 window.goInstructor = function() {
   const name = document.getElementById('instructorName').value.trim();
   if (!name) {
     document.getElementById('instError').style.display = 'block';
     return;
   }
   document.getElementById('instError').style.display = 'none';

   // Store instructor name
   localStorage.setItem("instructorName", name);

   // Optionally, we could also log instructor access in Firestore
   // but not required for demo. We'll do a silent write for tracking if desired.
   const instSessionRef = doc(db, "instructor_logins", "inst_" + Date.now());
   setDoc(instSessionRef, {
     name: name,
     loginTime: new Date().toISOString()
   }).catch(e => console.warn("Instructor log not stored (non-critical)", e));

   // Redirect to instructor dashboard (you must have instructor.html)
   window.location.href = "instructor.html";
 };

 // Minor: clear fields when modal closes (optional, but nice)
 // We can override closeModal to also clear fields, but let's keep it simple.
 // If you want clearing, you can attach event listeners but not necessary.
 </script>

 <!-- ============================= -->
 <!-- Fallback for very old browsers (ensures modal buttons work if module fails) -->
 <!-- ============================= -->
 <script>
 (function() {
   // Ensure that if module loading fails, the buttons don't throw
   window.openModal = window.openModal || function(role) { alert('Firebase module loading, please wait.'); };
   window.closeModal = window.closeModal || function(role) { };
   window.startStudentSession = window.startStudentSession || function() { alert('Initializing... please try again in a moment.'); };
   window.goInstructor = window.goInstructor || function() { alert('Initializing... please try again in a moment.'); };
 })();
 </script>

 <!-- Developer note: student.html and instructor.html must exist for redirection to work -->
</body>
</html>
