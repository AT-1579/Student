<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdaptIQ – Instructor</title>
  <link rel="stylesheet" href="css/style1.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .instructor-container {
      max-width: 1200px;
      margin: 100px auto;
      padding: 0 24px;
    }

    .student-list {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 24px;
      margin-top: 40px;
    }

    .student-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .weak {
      color: #f87171;
    }

    .chart-container {
      width: 100%;
      height: 300px;
      margin: 40px 0;
    }

    .menu-dropdown {
      position: absolute;
      top: 70px;
      right: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.5rem 0;
      display: none;
      flex-direction: column;
      min-width: 160px;
      z-index: 100;
    }

    .menu-dropdown.show {
      display: flex;
    }

    .menu-dropdown a {
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <header class="header">
    <div class="container header-inner">
      <a class="logo" href="index.html">AdaptIQ</a>
      <div class="flex gap-8">
        <div id="menuIcon" style="cursor:pointer; font-size:1.8rem;">☰</div>
      </div>
    </div>
    <div id="roleMenu" class="menu-dropdown">
      <a href="instructor.html">Instructor Dashboard</a>
      <a href="admin.html">Admin Panel</a>
      <a href="#" onclick="logout(); return false;">Logout</a>
    </div>
  </header>

  <div class="instructor-container">
    <h1>Instructor Dashboard</h1>
    <p>Class performance and analytics</p>

    <div class="chart-container">
      <canvas id="performanceChart"></canvas>
    </div>

    <div class="student-list" id="studentList">
      <h3>Student Performance</h3>
      <div class="student-item"><span>Loading...</span></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1wU1fyWECpkTXprHwDEUUs8YraFFdiHk",
      authDomain: "college-website-e4684.firebaseapp.com",
      projectId: "college-website-e4684",
      storageBucket: "college-website-e4684.firebasestorage.app",
      messagingSenderId: "860004770297",
      appId: "1:860004770297:web:1550b244e4af7c74901d28",
      measurementId: "G-G0YN0KDJ67"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Menu toggle
    const menuIcon = document.getElementById('menuIcon');
    const roleMenu = document.getElementById('roleMenu');
    menuIcon.addEventListener('click', (e) => {
      e.stopPropagation();
      roleMenu.classList.toggle('show');
    });
    document.addEventListener('click', () => roleMenu.classList.remove('show'));

    if (localStorage.getItem('adminKey') === 'true') {
      loadInstructorData();
    } else {
      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }

        // Admin bypass fallback
        if (user.email === 'eswarakhil36@gmail.com') {
          loadInstructorData();
          return;
        }

        // Check if user is instructor
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (!userDoc.exists() || userDoc.data().role !== 'instructor') {
          alert('Access denied. Instructors only.');
          window.location.href = 'dashboard.html';
          return;
        }
        loadInstructorData();
      });
    }

    window.logout = async () => {
      localStorage.removeItem('adminKey');
      const { signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      await signOut(auth);
      window.location.replace('index.html');
    };

    async function loadInstructorData() {
      // Get all students
      const studentsQuery = query(collection(db, 'users'), where('role', '==', 'student'));
      const studentSnap = await getDocs(studentsQuery);
      const students = studentSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      // Display student list with mock weak areas
      const listDiv = document.getElementById('studentList');
      if (students.length === 0) {
        listDiv.innerHTML += '<p>No students yet.</p>';
      } else {
        let html = '<h3>Student Performance</h3>';
        students.forEach(s => {
          // Mock weak areas – in real app, compute from responses
          const weak = Math.random() > 0.5 ? 'Algebra' : 'Geometry';
          html += `<div class="student-item"><span>${s.name}</span><span class="weak">Weak: ${weak}</span></div>`;
        });
        listDiv.innerHTML = html;
      }

      // Dummy chart (replace with real data)
      const ctx = document.getElementById('performanceChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Week1', 'Week2', 'Week3', 'Week4'],
          datasets: [{
            label: 'Class Average Ability',
            data: [0.2, 0.5, 0.8, 1.2],
            borderColor: '#6366f1'
          }]
        }
      });
    }
  </script>
</body>

</html>
