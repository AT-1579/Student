<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdaptIQ – Login</title>
  <meta name="description" content="Sign in or sign up to start your adaptive learning journey." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Additional styles for auth page */
    .auth-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      justify-content: center;
    }

    .auth-tab {
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .auth-tab.active {
      color: var(--accent-purple);
      border-bottom-color: var(--accent-purple);
    }

    .auth-form {
      display: none;
      animation: fade 0.3s ease;
    }

    .auth-form.active {
      display: block;
    }

    @keyframes fade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .menu-dropdown {
      position: absolute;
      top: 60px;
      right: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.5rem 0;
      display: none;
      flex-direction: column;
      min-width: 160px;
      z-index: 100;
    }

    .menu-dropdown.show {
      display: flex;
    }

    .menu-dropdown a {
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      text-decoration: none;
      transition: background 0.2s;
    }

    .menu-dropdown a:hover {
      background: rgba(99, 102, 241, 0.1);
    }

    .role-selector {
      margin-bottom: 18px;
    }

    .role-selector label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .role-options {
      display: flex;
      gap: 20px;
    }

    .role-options label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
      color: var(--text-primary);
      cursor: pointer;
    }

    #instructorCodeField {
      display: none;
    }
  </style>
</head>

<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <header class="header">
    <div class="container header-inner">
      <a class="logo" href="index.html">AdaptIQ</a>
      <div class="flex gap-8">
        <div id="menuIcon" style="cursor:pointer; font-size:1.8rem; line-height:1;">☰</div>
      </div>
    </div>
    <div id="roleMenu" class="menu-dropdown">
      <a href="instructor.html">Instructor Dashboard</a>
      <a href="admin.html">Admin Panel</a>
      <a href="#" id="logoutLink" style="display:none;" onclick="logout(); return false;">Logout</a>
    </div>
  </header>

  <main class="hero">
    <div class="z-1" style="max-width: 480px; width:100%;">
      <div class="hero-tag" style="margin-bottom: 20px;">🔐 Secure Access</div>
      <h2 class="hero-title" style="font-size:2rem;">Welcome back</h2>
      <p class="hero-sub" style="margin-bottom: 32px;">Sign in or create an account to continue.</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="signin">Sign In</div>
        <div class="auth-tab" data-tab="signup">Sign Up</div>
        <div class="auth-tab" data-tab="admin">Admin</div>
      </div>

      <!-- Sign In Form -->
      <div id="signinForm" class="auth-form active">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="signinEmail" class="input" type="email" placeholder="student@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="signinPassword" class="input" type="password" placeholder="••••••••" />
        </div>
        <div class="error-msg" id="signinError" style="margin-bottom: 16px;"></div>
        <button class="btn btn-primary btn-full" id="signinBtn">Sign In →</button>
      </div>

      <!-- Admin Form -->
      <div id="adminForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input id="adminEmail" class="input" type="email" placeholder="admin@adaptiq.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="adminPassword" class="input" type="password" placeholder="••••••••" />
        </div>
        <div class="error-msg" id="adminError" style="margin-bottom: 16px;"></div>
        <button class="btn btn-primary btn-full" id="adminAuthBtn">Admin Login →</button>
      </div>

      <!-- Sign Up Form -->
      <div id="signupForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input id="signupName" class="input" type="text" placeholder="e.g. Priya Sharma" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="signupEmail" class="input" type="email" placeholder="student@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="signupPassword" class="input" type="password" placeholder="Min. 6 characters" />
        </div>
        <div class="form-group role-selector">
          <label>I am a:</label>
          <div class="role-options">
            <label><input type="radio" name="role" value="student" checked> Student</label>
            <label><input type="radio" name="role" value="instructor"> Instructor</label>
          </div>
        </div>
        <div class="form-group" id="instructorCodeField">
          <label class="form-label">Instructor Code</label>
          <input id="signupCode" class="input" type="text" placeholder="Enter invitation code" />
        </div>
        <div class="form-group">
          <label class="form-label">Grade / Year</label>
          <select id="signupGrade" class="input">
            <option value="">Select Grade</option>
            <option value="grade8">Grade 8</option>
            <option value="grade9">Grade 9</option>
            <option value="grade10">Grade 10</option>
            <option value="grade11">Grade 11</option>
            <option value="grade12">Grade 12</option>
            <option value="undergrad">Undergraduate</option>
            <option value="postgrad">Postgraduate</option>
          </select>
        </div>
        <div class="error-msg" id="signupError" style="margin-bottom: 16px;"></div>
        <button class="btn btn-success btn-full" id="signupBtn">Create Account →</button>
      </div>
    </div>
  </main>

  <!-- Firebase & Auth Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1wU1fyWECpkTXprHwDEUUs8YraFFdiHk",
      authDomain: "college-website-e4684.firebaseapp.com",
      projectId: "college-website-e4684",
      storageBucket: "college-website-e4684.firebasestorage.app",
      messagingSenderId: "860004770297",
      appId: "1:860004770297:web:1550b244e4af7c74901d28",
      measurementId: "G-G0YN0KDJ67"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ─── ADMIN BYPASS ───────────────────────────────
    if (localStorage.getItem('adminKey') === 'true') {
      window.location.replace('admin.html');
    }

    // ─── AUTO-REDIRECT IF ALREADY LOGGED IN ───────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        console.log("User already signed in:", user.email);
        try {
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (user.email === 'eswarakhil36@gmail.com') {
            window.location.href = 'admin.html';
            return;
          }
          if (userDoc.exists()) {
            const role = userDoc.data().role;
            if (role === 'instructor') window.location.href = 'instructor.html';
            else if (role === 'admin') window.location.href = 'admin.html';
            else window.location.href = 'dashboard.html';
          } else {
            // No Firestore record – treat as student
            window.location.href = 'dashboard.html';
          }
        } catch (e) {
          console.error("Error during auto-redirect:", e);
          // fallback
          window.location.href = 'dashboard.html';
        }
      } else {
        document.getElementById('logoutLink').style.display = 'none';
      }
    });

    window.logout = () => {
      import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js")
        .then(({ signOut }) => signOut(auth));
    };

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const formId = tab.dataset.tab + 'Form';
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.getElementById(formId).classList.add('active');
      });
    });

    // Show/hide instructor code field based on role selection
    document.querySelectorAll('input[name="role"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const codeField = document.getElementById('instructorCodeField');
        codeField.style.display = e.target.value === 'instructor' ? 'block' : 'none';
      });
    });

    // Three‑line menu toggle
    const menuIcon = document.getElementById('menuIcon');
    const roleMenu = document.getElementById('roleMenu');
    menuIcon.addEventListener('click', (e) => {
      e.stopPropagation();
      roleMenu.classList.toggle('show');
    });
    document.addEventListener('click', () => roleMenu.classList.remove('show'));

    // Sign Up
    document.getElementById('signupBtn').addEventListener('click', async (e) => {
      e.preventDefault(); // Prevent any default form submission
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value.trim();
      const grade = document.getElementById('signupGrade').value;
      const role = document.querySelector('input[name="role"]:checked').value;
      const instructorCode = document.getElementById('signupCode').value.trim();
      const errorDiv = document.getElementById('signupError');

      errorDiv.style.display = 'none'; // Hide previous errors

      // Validation
      if (!name || !email || !password || !grade) {
        errorDiv.textContent = 'All fields are required.';
        errorDiv.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorDiv.textContent = 'Password must be at least 6 characters.';
        errorDiv.style.display = 'block';
        return;
      }
      if (role === 'instructor') {
        if (!instructorCode) {
          errorDiv.textContent = 'Instructor code is required.';
          errorDiv.style.display = 'block';
          return;
        }
        try {
          const codesRef = collection(db, 'instructor_codes');
          const q = query(codesRef, where('code', '==', instructorCode), where('used', '==', false));
          const snapshot = await getDocs(q);
          if (snapshot.empty) {
            errorDiv.textContent = 'Invalid or already used instructor code.';
            errorDiv.style.display = 'block';
            return;
          }
          var codeDoc = snapshot.docs[0];
        } catch (e) {
          console.error("Code check error:", e);
          errorDiv.textContent = 'Error verifying code. Please try again.';
          errorDiv.style.display = 'block';
          return;
        }
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await updateProfile(user, { displayName: name });

        const userData = {
          name,
          email,
          grade,
          createdAt: new Date().toISOString(),
          uid: user.uid,
          role: role
        };
        await setDoc(doc(db, 'users', user.uid), userData);

        if (role === 'instructor' && codeDoc) {
          await setDoc(doc(db, 'instructor_codes', codeDoc.id), { used: true, usedBy: user.uid, usedAt: new Date().toISOString() }, { merge: true });
        }

        // Redirect will be handled by onAuthStateChanged, but we can also redirect directly
        if (role === 'instructor') window.location.href = 'instructor.html';
        else window.location.href = 'dashboard.html';
      } catch (error) {
        console.error("Sign up error:", error);
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
      }
    });

    // Sign In
    document.getElementById('signinBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signinEmail').value.trim();
      const password = document.getElementById('signinPassword').value.trim();
      const errorDiv = document.getElementById('signinError');

      errorDiv.style.display = 'none';

      if (!email || !password) {
        errorDiv.textContent = 'Email and password are required.';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        console.log("Sign in successful:", userCredential.user.email);
        // onAuthStateChanged will handle redirect, we don't need to manually redirect here.
      } catch (error) {
        console.error("Sign in error:", error);
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
      }
    });
    // Admin Login Logic
    document.getElementById('adminAuthBtn').addEventListener('click', (e) => {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value.trim();
      const errorDiv = document.getElementById('adminError');
      errorDiv.style.display = 'none';

      if (email === 'eswarakhil36@gmail.com' && password === '123456789') {
        localStorage.setItem('adminKey', 'true');
        window.location.href = 'admin.html';
      } else {
        errorDiv.textContent = 'Invalid admin credentials.';
        errorDiv.style.display = 'block';
      }
    });

  </script>
</body>

</html>
